                    <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                        <circle cx="8" cy="8" r="2.5" />
                        <path
                            d="M8 3v2M8 11v2M3 8h2M11 8h2M4.5 4.5l1.5 1.5M10 10l1.5 1.5M4.5 11.5l1.5-1.5M10 6l1.5-1.5" />

            </p>

        <div class="absolute -top-30 left-1/2 -translate-x-1/2 w-[75%] h-full pointer-events-none opacity-60"

        background-size: 13px 13px;
        background-position: 0 -40px;

        -webkit-mask-image:
            linear-gradient(
                to bottom,
                transparent 0%,
                transparent 25%,
                black 25%,
                black 75%,
                transparent 75%,
                transparent 100%
            ),
            linear-gradient(135deg, transparent 0%, black 40%, black 100%),
            linear-gradient(225deg, transparent 0%, black 40%, black 100%);

        mask-image:
            linear-gradient(
                to bottom,
                transparent 0%,
                transparent 25%,
                black 25%,
                black 75%,
                transparent 75%,
                transparent 100%
            ),
            linear-gradient(135deg, transparent 0%, black 40%, black 100%),
            linear-gradient(225deg, transparent 0%, black 40%, black 100%);

        -webkit-mask-composite: source-in;
        mask-composite: intersect;
     ">

        <!-- SERVICES -->
        <div class="relative flex flex-wrap justify-center items-stretch gap-6 z-10">

            <article class="relative w-full sm:w-[230px] md:w-[270px] rounded-2xl overflow-hidden group"

            <article class="relative w-[130px] sm:w-[130px] md:w-[180px] rounded-[20px] overflow-hidden group"

            <article class="relative w-[130px] sm:w-[130px] md:w-[180px] rounded-[20px] overflow-hidden group"

                    <span class="text-[16px] rotate-180 [writing-mode:vertical-rl]">
                        Media owners
                    </span>

                </div>
