<section class=" reservation relative w-full bg-black text-white overflow-hidden" aria-labelledby="portfolio-heading">

    <div class="max-w-7xl mx-auto px-6 md:px-10 py-16 lg:py-24 flex justify-center">

        <!-- CARD -->
        <div class="relative w-full md:w-[70%] rounded-3xl overflow-hidden shadow-2xl">

            <!-- Background Image -->
            <img [src]="'./assets/last section background.png'" alt="Background abstract media strategy design"
                aria-hidden="true" class="absolute inset-0 w-full h-full object-cover" />

            <!-- Dark Overlay -->
            <div class="absolute inset-0 bg-black/70"></div>

            <!-- CONTENT -->
            <div class="relative z-10 p-8 md:p-12 space-y-12 text-center">

                <!-- Heading -->
                <div class="max-w-3xl mx-auto space-y-4">
                    <h2 id="portfolio-heading" class="text-2xl md:text-3xl lg:text-4xl leading-tight">
                        Supercharge Your Media Strategy with <br />
                        Our 100% Efficiency
                    </h2>

                    <p class="text-white/70 text-sm md:text-base">
                        Optimize campaigns, increase ROI, and manage everything in one place.
                    </p>
                </div>

                <!-- Content Row -->
                <div class="flex flex-col items-center gap-10">

                    <div class="list">
                        <ul class="flex flex-row items-center justify-center gap-10 text-base md:text-lg">

                            <li class="flex items-center gap-3">
                                <i class="fa-solid fa-circle-check text-[#F11A58]" aria-hidden="true"></i>
                                <span>Plan, Book and Manage Campaigns</span>
                            </li>

                            <li class="flex items-center gap-3">
                                <i class="fa-solid fa-circle-check text-[#F11A58]" aria-hidden="true"></i>
                                <span>Maximize Reach and ROI</span>
                            </li>

                        </ul>
                    </div>
                    <!-- List -->


                    <!-- CTA Button -->
                    <button type="button" class="bg-[#F11A58] text-black font-semibold
                   px-10 py-5 rounded-lg
                   hover:opacity-90 transition
                   focus:outline-none focus:ring-4 focus:ring-[#FA2B39]/40 cursor-pointer"
                        aria-label="Optimize your media today">
                        Optimize Your media today
                        <i class="fa-solid fa-angle-right ml-2" aria-hidden="true"></i>
                    </button>

                </div>

            </div>
        </div>

    </div>

</section>
